name: Deduplicate Subscribe Links

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'  # 每天中午12点（UTC）自动运行

jobs:
  deduplicate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List config dir for debug
        run: ls -l config

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run deduplication script
        run: python config/deduplicate_links.py

      - name: Show deduped results
        run: ls -l config/deduped

      - name: Upload deduped results
        uses: actions/upload-artifact@v4
        with:
          name: deduped-subscribe
          path: config/deduped/subscribe.txt
