name: Deduplicate subscribe.txt

on:
  workflow_dispatch:

jobs:
  dedup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deduplication script
        run: python config/dedup_subscribe.py

      - name: Show diff (optional)
        run: git diff --color

      - name: Upload deduped file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deduped-subscribe-txt
          path: config/deduped/subscribe.txt
